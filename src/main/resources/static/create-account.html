<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Bank - Create Account</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background:
                    radial-gradient(circle at top left, #2563eb 0%, transparent 35%),
                    radial-gradient(circle at bottom right, #7c3aed 0%, transparent 35%),
                    linear-gradient(135deg, #0f172a, #111827, #1e293b);
        }

        .container {
            width: 100%;
            max-width: 430px;
            padding: 35px 28px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
                    0 20px 50px rgba(0, 0, 0, 0.35),
                    inset 0 1px 0 rgba(255, 255, 255, 0.08);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            color: #ffffff;
            font-size: 30px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-top: 16px;
            font-size: 14px;
            color: #e2e8f0;
            font-weight: 500;
        }

        input,
        select {
            width: 100%;
            margin-top: 8px;
            padding: 13px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s ease;
            appearance: none;
        }

        select option {
            color: #111827;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus,
        select:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
            background: rgba(255, 255, 255, 0.12);
        }

        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.35);
        }

        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
            box-shadow: 0 14px 24px rgba(37, 99, 235, 0.45);
        }

        button:active {
            transform: scale(0.98);
        }

        .error {
            text-align: left;
            color: #f87171;
            font-size: 13px;
            margin-top: 6px;
            min-height: 18px;
        }

        .success {
            text-align: center;
            color: #4ade80;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 20px;
            }

            h2 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Open Account</h2>
    <p class="subtitle">Create your new Secure Bank account</p>

    <form>
        <!--            onsubmit="handleSubmit(event)">-->
        <label>
            Account Type
            <select id="accountType" required>
                <option value="">Select Account Type</option>
                <option value="SAVINGS">Savings</option>
                <option value="CURRENT">Current</option>
            </select>
        </label>
        <p class="error" id="typeError"></p>

        <label>
            Initial Deposit
            <input type="number" id="balance" placeholder="Enter amount" required min="0">
        </label>
        <p class="error" id="balanceError"></p>

        <button type="submit">Create Account</button>
    </form>

</div>

</body>
