<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">

    <title>SecureBank Dashboard</title>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>SecureBank</h2>

    <a href="/dashboard">Dashboard</a>
    <a href="/dashboard/deposit">Deposit</a>
    <a href="/dashboard/withdraw">Withdraw</a>
    <a href="/dashboard/transfer">Transfer Money</a>
    <a href="/dashboard/transactions">Transactions</a>
<!--    <button onclick="logout()" id="logoutBtn">Logout</button>-->

</div>

<!-- Main -->
<div class="main">

    <!-- Header -->
    <div class="header">
        <h1>Dashboard</h1>
        <div class="user">Welcome, <span id="userName">User</span></div>
    </div>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>Total Balance</h3>
            <p>₹ <span id="balance">0.00</span></p>
        </div>

        <div class="card">
            <h3>Last Transaction</h3>
            <p>₹ <span id="lastTransactionAmount">0.00</span></p>
        </div>

        <div class="card">
            <h3>Transfers</h3>
            <p>0</p>
        </div>

        <div class="card">
            <h3>Account Number</h3>
            <p id="accountNumber">0x0y0z</p>
        </div>
    </div>

    <div class="section">
        <h3>Recent Activity</h3>
        <p id="transactions">No transactions yet...</p>
    </div>

</div>

</body>
