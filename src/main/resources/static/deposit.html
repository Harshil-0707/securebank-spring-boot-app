<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Deposit</title>
</head>

<body>

<div class="sidebar">
    <h2>SecureBank</h2>

    <a href="/dashboard">Dashboard</a>
    <a href="/dashboard/deposit">Deposit</a>
    <a href="/dashboard/withdraw">Withdraw</a>
    <a href="/dashboard/transfer">Transfer Money</a>
    <a href="/dashboard/transactions">Transactions</a>
    <button onclick="logout()" id="logoutBtn">Logout</button>
</div>

<div class="main">

    <div class="header">
        <h1>Deposit</h1>
        <div class="user">Secure Transaction</div>
    </div>

    <div class="section">
        <div id="messageBox"></div>
        <form>
<!--                onsubmit="handleSubmit(event)">-->

            <label for="accountNumber">
                Account Number
                <input type="text" name="accountNumber" id="accountNumber" required>
            </label>

            <label for="amount">
                Amount
                <input type="number" name="amount" min="100" id="amount" required>
            </label>

            <button type="submit" class="primary-btn deposit-btn">
                Deposit Money
            </button>

        </form>
    </div>

</div>

</body>

<script>
    function handleSubmit(e) {
        e.preventDefault();

        const accountNumber = document.getElementById("accountNumber");
        const amount = document.getElementById("amount");
        const messageBox = document.getElementById("messageBox");

        submitData();

        async function submitData() {
            fetch("http://localhost:8080/dashboard/deposit/api/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    accountNumber: accountNumber.value,
                    amount: amount.value,
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.message === "Success") {
                        messageBox.textContent = "Deposit successful";
                        messageBox.style.color = "green";

                        accountNumber.value = "";
                        amount.value = "";
                    } else {
                        messageBox.textContent = data.message;
                        messageBox.style.color = "red";
                    }
                })
                .catch(err => {
                    messageBox.textContent = "Something went wrong";
                    messageBox.style.color = "red";
                    console.error(err);
                });
        }
    }

    async function logout() {
        fetch("http://localhost:8080/logout")
            .then(data => data.json())
            .then(data => {
                if (data.message === "Success") {
                    setTimeout(() => {
                        window.location.href = "http://localhost:8080/";
                    }, 100);
                } else {
                    console.log(data.message);
                }
            })
            .catch(e => console.error("Error logging out: ", e));
    }
</script>

</html>
